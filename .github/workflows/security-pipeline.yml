name: Security CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test-sast-secrets-vulnscan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        working-directory: ./app
        run: npm ci

      - name: Run tests
        working-directory: ./app
        run: npm test

      - name: Install Semgrep
        run: python -m pip install semgrep

      - name: Run Semgrep SAST scan
        run: semgrep scan --config p/javascript --config p/security-audit --json --output semgrep-report.json app

      - name: Upload Semgrep report
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sast-report
          path: semgrep-report.json

      - name: Run Gitleaks secret scan
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo" ghcr.io/gitleaks/gitleaks:latest dir /repo --redact --report-format=json --report-path=/repo/gitleaks-report.json --exit-code=0

      - name: Upload Gitleaks report
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-secret-report
          path: gitleaks-report.json

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: trivy-fs-report.json
          exit-code: 0

      - name: Upload Trivy filesystem report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-filesystem-report
          path: trivy-fs-report.json

      - name: Build Docker image
        run: docker build -t devsecops-secure-app .

      - name: Run Trivy Docker image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: devsecops-secure-app
          format: json
          output: trivy-image-report.json
          exit-code: 0

      - name: Upload Trivy Docker image report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: trivy-image-report.json
